name: Update star counts

on:
  schedule:
    # Every Monday at 08:00 UTC
    - cron: "0 8 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Refresh star counts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 .github/scripts/update_stars.py

      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain README.md README.zh-CN.md)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md README.zh-CN.md
            git commit -m "chore: refresh star counts"
            git push
          else
            echo "No star-count changes to commit."
          fi
